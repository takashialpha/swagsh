name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Build
      run: cargo build --verbose

    - name: Clippy
      run: cargo clippy

  macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v5

    - name: Build
      run: cargo build --verbose

    - name: Clippy
      run: cargo clippy
