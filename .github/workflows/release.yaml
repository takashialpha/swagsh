name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Prepare and compress binary
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/swagsh artifacts/swagsh
          chmod +x artifacts/swagsh
          cd artifacts
          tar -czf swagsh-${{ github.ref_name }}-x86_64-linux.tar.gz swagsh
          ls -lh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: swagsh-x86_64-unknown-linux-gnu
          path: artifacts/swagsh-${{ github.ref_name }}-x86_64-linux.tar.gz
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built archive
        uses: actions/download-artifact@v8
        with:
          name: swagsh-x86_64-unknown-linux-gnu
          path: artifacts
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: swagsh ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: artifacts/swagsh-${{ github.ref_name }}-x86_64-linux.tar.gz
