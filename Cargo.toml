[package]
name = "swagsh"
version = "0.3.0"
edition = "2024"
description = "A sleek, high-performance POSIX-compatible shell built in Rust for speed and reliability. Name inspired by 'swag' slang for stylish flair."
authors = ["takashialpha <takashialpha@protonmail.com>"]
license = "Apache-2.0"

[dependencies]
clap = { version = "4.5.60", features = ["derive", "env"] }
libc = "0.2.182"
serde = { version = "1.0.228", features = ["derive"] }
app_base = { git = "https://github.com/takashialpha/app_base.git" }

[profile.release]
strip = true
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false
overflow-checks = false
incremental = false
