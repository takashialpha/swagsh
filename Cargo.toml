[package]
name = "swagsh"
version = "0.5.0"
edition = "2024"
description = "A sleek, high-performance POSIX-compatible shell. Name inspired by 'swag' slang for stylish flair."
authors = ["takashialpha <takashialpha@protonmail.com>"]
license = "Apache-2.0"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
anyhow = "1"
rustyline = "17"
nix = { version = "0.31", features = ["process", "signal", "term"] }
libc = "0.2"
ahash = "0.8"

[profile.release]
strip = true
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false
overflow-checks = false
incremental = false
