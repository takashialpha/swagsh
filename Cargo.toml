[package]
name = "swagsh"
version = "0.3.0"
edition = "2024"
description = "A sleek, high-performance POSIX-compatible shell built in Rust for speed and reliability. Name inspired by 'swag' slang for stylish flair."
authors = ["takashialpha <takashialpha@protonmail.com>"]
license = "Apache-2.0"

[dependencies]
clap = { version = "4.6.0", features = ["derive", "env"] }
anyhow = "1.0.102"
rustyline = "17.0.2"
signal-hook = "0.4.3"
nix = { version = "0.31.2", features = ["process", "signal", "term"] }
libc = "0.2.183"

[profile.release]
strip = true
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false
overflow-checks = false
incremental = false
