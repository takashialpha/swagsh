[package]
name = "swagsh"
version = "0.5.2"
edition = "2024"
description = "A sleek, high-performance POSIX-compatible shell. Name inspired by 'swag' slang for stylish flair."
authors = ["takashialpha <takashialpha@protonmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/takashialpha/swagsh"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
anyhow = "1"
rustyline = "18"
nix = { version = "0.31", features = ["process", "signal", "term"] }
libc = "0.2"
ahash = "0.8"

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
